# Render deployment configuration

services:
  # Web Service
  - type: web
    name: loader-directory
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: "pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: loader-db
          property: connectionString

databases:
  - name: loader-db
    databaseName: loader_directory
    user: loader_user
    plan: free
