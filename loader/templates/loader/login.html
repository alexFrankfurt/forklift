{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <link rel="stylesheet" href="{% static 'loader/styles.css' %}?v=4">
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-logo">АИС ОГПА</div>
    </div>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-box">
            <h1 class="login-title">Вход в систему</h1>
            
            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}
            
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Имя пользователя</label>
                    <input type="text" id="username" name="username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="login-btn">Войти</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        © 2026 АИС ОГПА. Все права защищены.
    </div>

    <script>
        // Theme initialization for login page
        const THEMES = {
            SYSTEM: 'system',
            LIGHT: 'light',
            DARK: 'dark'
        };

        (function() {
            const savedTheme = localStorage.getItem('theme') || THEMES.SYSTEM;
            
            if (savedTheme === THEMES.SYSTEM) {
                const systemDarkTheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', systemDarkTheme ? 'dark' : 'light');
            } else {
                document.documentElement.setAttribute('data-theme', savedTheme);
            }
        })();
    </script>
</body>
</html>
